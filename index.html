<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2D6A4F" />
  <meta name="description" content="家用備品管理 — 輕鬆追蹤家中所有備品" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="家備管家" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>家備管家</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-deep:  #1B4332;
      --green-mid:   #2D6A4F;
      --green-light: #40916C;
      --green-pale:  #D8F3DC;
      --green-ghost: #F0FAF2;
      --sand:        #F8F4EE;
      --sand-dark:   #EDE6D8;
      --ink:         #1A1A1A;
      --ink-soft:    #4A4A4A;
      --ink-muted:   #8A8A8A;
      --red:         #C0392B;
      --red-pale:    #FDECEA;
      --amber:       #D97706;
      --amber-pale:  #FEF3C7;
      --white:       #FFFFFF;
      --radius:      14px;
      --shadow:      0 2px 16px rgba(0,0,0,0.08);
      --shadow-lg:   0 8px 32px rgba(0,0,0,0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--sand);
      color: var(--ink);
      min-height: 100vh;
      padding-bottom: 100px;
    }

    /* ── HEADER ── */
    header {
      background: var(--green-deep);
      color: var(--white);
      padding: 52px 20px 20px;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -30px; left: 30%;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }
    .header-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 2px;
    }
    .header-subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-top: 4px;
      letter-spacing: 1px;
    }
    .header-stats {
      display: flex;
      gap: 20px;
      margin-top: 18px;
    }
    .stat-chip {
      background: rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .stat-chip span { font-weight: 600; font-size: 15px; }

    /* ── ALERTS BANNER ── */
    #alertBanner {
      display: none;
      margin: 16px 16px 0;
      background: var(--red-pale);
      border: 1px solid #F5C6C2;
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .alert-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--red);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .alert-item {
      font-size: 12px;
      color: #7B241C;
      padding: 3px 0;
      border-bottom: 1px solid rgba(192,57,43,0.1);
    }
    .alert-item:last-child { border-bottom: none; }

    #warningBanner {
      display: none;
      margin: 10px 16px 0;
      background: var(--amber-pale);
      border: 1px solid #FCD34D;
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .warning-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--amber);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .warning-item {
      font-size: 12px;
      color: #92400E;
      padding: 3px 0;
      border-bottom: 1px solid rgba(217,119,6,0.1);
    }
    .warning-item:last-child { border-bottom: none; }

    /* ── SEARCH & FILTER ── */
    .controls {
      padding: 16px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .search-box {
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      border: 1.5px solid var(--sand-dark);
      border-radius: 30px;
      font-size: 14px;
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--white);
      color: var(--ink);
      outline: none;
      transition: border 0.2s;
    }
    .search-box input:focus { border-color: var(--green-light); }
    .search-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      pointer-events: none;
    }
    .filter-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-family: 'Noto Sans TC', sans-serif;
      border: 1.5px solid var(--sand-dark);
      background: var(--white);
      color: var(--ink-soft);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-chip.active {
      background: var(--green-mid);
      border-color: var(--green-mid);
      color: var(--white);
    }

    /* ── LIST ── */
    .section-label {
      padding: 20px 16px 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--ink-muted);
      text-transform: uppercase;
    }
    #itemList { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }

    .item-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }
    .item-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--green-light);
      border-radius: 4px 0 0 4px;
    }
    .item-card.status-low::before  { background: var(--amber); }
    .item-card.status-out::before  { background: var(--red); }
    .item-card.status-expiring::before { background: var(--red); }
    .item-card:active { transform: scale(0.98); box-shadow: var(--shadow-lg); }

    .item-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: var(--green-ghost);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .item-card.status-low .item-icon  { background: var(--amber-pale); }
    .item-card.status-out .item-icon  { background: var(--red-pale); }

    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-meta {
      font-size: 12px;
      color: var(--ink-muted);
      margin-top: 3px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .meta-tag {
      background: var(--sand);
      border-radius: 6px;
      padding: 2px 7px;
    }
    .item-right { text-align: right; flex-shrink: 0; }
    .qty-badge {
      font-family: 'Noto Serif TC', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--green-mid);
    }
    .item-card.status-low  .qty-badge { color: var(--amber); }
    .item-card.status-out  .qty-badge { color: var(--red); }
    .qty-unit { font-size: 11px; color: var(--ink-muted); }
    .need-buy-tag {
      display: inline-block;
      font-size: 10px;
      background: var(--red-pale);
      color: var(--red);
      border-radius: 4px;
      padding: 2px 6px;
      margin-top: 4px;
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-muted);
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: 88px; right: 20px;
      width: 56px; height: 56px;
      background: var(--green-mid);
      color: var(--white);
      border-radius: 50%;
      border: none;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(45,106,79,0.4);
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
      z-index: 100;
    }
    .fab:active { transform: scale(0.92); background: var(--green-deep); }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--white);
      border-top: 1px solid var(--sand-dark);
      display: flex;
      padding: 8px 0 env(safe-area-inset-bottom);
      z-index: 200;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 6px 0;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-muted);
      font-size: 10px;
      font-family: 'Noto Sans TC', sans-serif;
      transition: color 0.2s;
    }
    .nav-btn .nav-icon { font-size: 20px; }
    .nav-btn.active { color: var(--green-mid); }

    /* ── MODAL OVERLAY ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 300;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal-sheet {
      background: var(--white);
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      padding: 0 0 env(safe-area-inset-bottom);
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    }
    .modal-overlay.open .modal-sheet { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--sand-dark);
      border-radius: 4px;
      margin: 12px auto 0;
    }
    .sheet-header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--sand);
    }
    .sheet-title {
      font-family: 'Noto Serif TC', serif;
      font-size: 18px;
      font-weight: 700;
    }
    .sheet-close {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--sand);
      border: none;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .sheet-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }

    /* ── FORM ── */
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--ink-soft);
      letter-spacing: 0.5px;
    }
    .form-input, .form-select {
      padding: 12px 14px;
      border: 1.5px solid var(--sand-dark);
      border-radius: 10px;
      font-size: 15px;
      font-family: 'Noto Sans TC', sans-serif;
      color: var(--ink);
      background: var(--white);
      outline: none;
      transition: border 0.2s;
      width: 100%;
    }
    .form-input:focus, .form-select:focus { border-color: var(--green-light); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-hint { font-size: 11px; color: var(--ink-muted); }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }
    .toggle-label { font-size: 14px; color: var(--ink-soft); }
    .toggle {
      width: 44px; height: 26px;
      background: var(--sand-dark);
      border-radius: 13px;
      position: relative;
      cursor: pointer;
      border: none;
      transition: background 0.2s;
    }
    .toggle::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      background: var(--white);
      border-radius: 50%;
      top: 3px; left: 3px;
      transition: transform 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .toggle.on { background: var(--green-mid); }
    .toggle.on::after { transform: translateX(18px); }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background: var(--green-mid);
      color: var(--white);
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 1px;
    }
    .btn-primary:active { background: var(--green-deep); }

    .btn-danger {
      width: 100%;
      padding: 14px;
      background: var(--red-pale);
      color: var(--red);
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-family: 'Noto Sans TC', sans-serif;
      cursor: pointer;
      margin-top: -4px;
    }

    /* ── DETAIL SHEET ── */
    .detail-icon-wrap {
      text-align: center;
      padding: 10px 0 0;
    }
    .detail-icon-big {
      font-size: 56px;
      display: block;
    }
    .detail-name {
      font-family: 'Noto Serif TC', serif;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-top: 6px;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .detail-cell {
      background: var(--sand);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .detail-cell-label { font-size: 11px; color: var(--ink-muted); margin-bottom: 4px; }
    .detail-cell-value { font-size: 16px; font-weight: 600; color: var(--ink); }

    .qty-control {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 8px 0;
    }
    .qty-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 2px solid var(--green-light);
      background: var(--green-ghost);
      color: var(--green-mid);
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: 700;
    }
    .qty-display {
      font-family: 'Noto Serif TC', serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--green-mid);
      min-width: 60px;
      text-align: center;
    }

    /* ── STATS PAGE ── */
    #statsPage {
      display: none;
      padding: 0 16px 20px;
    }
    #statsPage.active { display: block; }
    #mainPage { display: block; }
    #mainPage.hidden { display: none; }
    #notifPage { display: none; padding: 0 16px; }
    #notifPage.active { display: block; }

    .stats-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }
    .stats-card-title {
      font-size: 13px;
      color: var(--ink-muted);
      margin-bottom: 12px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .category-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--sand);
    }
    .category-row:last-child { border-bottom: none; }
    .cat-icon { font-size: 20px; width: 30px; text-align: center; }
    .cat-name { flex: 1; font-size: 14px; }
    .cat-bar-wrap { flex: 2; height: 6px; background: var(--sand-dark); border-radius: 3px; overflow: hidden; }
    .cat-bar { height: 100%; background: var(--green-light); border-radius: 3px; transition: width 0.5s; }
    .cat-count { font-size: 13px; font-weight: 600; color: var(--green-mid); width: 24px; text-align: right; }

    /* ── NOTIF PAGE ── */
    .notif-section-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--ink-muted);
      text-transform: uppercase;
      padding: 16px 0 8px;
    }
    .notif-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 8px;
      box-shadow: var(--shadow);
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .notif-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }
    .notif-dot.red { background: var(--red); }
    .notif-dot.amber { background: var(--amber); }
    .notif-dot.green { background: var(--green-light); }
    .notif-text { font-size: 13px; color: var(--ink-soft); line-height: 1.5; }
    .notif-time { font-size: 11px; color: var(--ink-muted); margin-top: 3px; }

    /* ── CATEGORY SUGGEST ── */
    #catSuggest {
      display: none;
      padding: 6px 0;
      font-size: 12px;
      color: var(--green-mid);
      font-weight: 600;
      cursor: pointer;
    }
    #catSuggest span { text-decoration: underline; }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-title">🏠 家備管家</div>
  <div class="header-subtitle">Home Inventory Manager</div>
  <div class="header-stats">
    <div class="stat-chip">📦 共 <span id="totalCount">0</span> 項</div>
    <div class="stat-chip">⚠️ 需補充 <span id="needBuyCount">0</span> 項</div>
  </div>
</header>

<!-- ALERT BANNERS -->
<div id="alertBanner">
  <div class="alert-title">🔴 需要立即處理</div>
  <div id="alertList"></div>
</div>
<div id="warningBanner">
  <div class="warning-title">🟡 注意提醒</div>
  <div id="warningList"></div>
</div>

<!-- MAIN PAGE -->
<div id="mainPage">
  <div class="controls">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜尋備品名稱…" oninput="renderList()" />
    </div>
    <div class="filter-row" id="filterRow">
      <button class="filter-chip active" data-filter="all" onclick="setFilter('all',this)">全部</button>
      <button class="filter-chip" data-filter="need" onclick="setFilter('need',this)">⚠️ 需補充</button>
    </div>
  </div>
  <div class="section-label" id="listLabel">所有備品</div>
  <div id="itemList"></div>
</div>

<!-- STATS PAGE -->
<div id="statsPage">
  <div class="section-label" style="padding-top:20px">備品統計</div>
  <div class="stats-card">
    <div class="stats-card-title">各類別數量</div>
    <div id="catStats"></div>
  </div>
  <div class="stats-card">
    <div class="stats-card-title">整體概況</div>
    <div id="overallStats" style="display:flex;flex-direction:column;gap:10px;"></div>
  </div>
</div>

<!-- NOTIF PAGE -->
<div id="notifPage">
  <div class="notif-section-title">通知中心</div>
  <div id="notifList"></div>
</div>

<!-- FAB -->
<button class="fab" onclick="openAddModal()" id="fabBtn">＋</button>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="navHome" onclick="switchTab('home')">
    <span class="nav-icon">🏠</span>首頁
  </button>
  <button class="nav-btn" id="navStats" onclick="switchTab('stats')">
    <span class="nav-icon">📊</span>統計
  </button>
  <button class="nav-btn" id="navNotif" onclick="switchTab('notif')">
    <span class="nav-icon">🔔</span>通知
  </button>
</nav>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="addModal" onclick="closeModalOutside(event,'addModal')">
  <div class="modal-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="modalTitle">新增備品</div>
      <button class="sheet-close" onclick="closeModal('addModal')">✕</button>
    </div>
    <div class="sheet-body">
      <div class="form-group">
        <label class="form-label">品項名稱 *</label>
        <input class="form-input" id="f_name" placeholder="例：舒潔濕紙巾" oninput="autoCategory()" />
        <div id="catSuggest">💡 偵測到類別：<span id="suggestText"></span>，點此套用</div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">類別</label>
          <select class="form-select" id="f_category">
            <option value="">選擇類別</option>
            <option>衛生紙類</option>
            <option>清潔用品</option>
            <option>洗髮沐浴</option>
            <option>口腔護理</option>
            <option>保養品類</option>
            <option>食品飲料</option>
            <option>調味料</option>
            <option>廚房用品</option>
            <option>醫療藥品</option>
            <option>電池電器</option>
            <option>文具辦公</option>
            <option>寵物用品</option>
            <option>嬰幼兒用品</option>
            <option>其他</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">存放位置</label>
          <input class="form-input" id="f_location" placeholder="例：浴室櫃" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">目前數量</label>
          <input class="form-input" id="f_qty" type="number" min="0" placeholder="0" />
        </div>
        <div class="form-group">
          <label class="form-label">單位</label>
          <input class="form-input" id="f_unit" placeholder="包 / 瓶 / 個" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">安全庫存量</label>
          <input class="form-input" id="f_minQty" type="number" min="0" placeholder="低於此數提醒" />
        </div>
        <div class="form-group">
          <label class="form-label">保存期限</label>
          <input class="form-input" id="f_expiry" type="date" />
        </div>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">📋 標記需購買</span>
        <button class="toggle" id="f_needBuy" onclick="this.classList.toggle('on')"></button>
      </div>
      <button class="btn-primary" onclick="saveItem()">儲存備品</button>
      <button class="btn-danger" id="deleteBtn" onclick="deleteItem()" style="display:none">🗑️ 刪除此備品</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal" onclick="closeModalOutside(event,'detailModal')">
  <div class="modal-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title">備品詳情</div>
      <button class="sheet-close" onclick="closeModal('detailModal')">✕</button>
    </div>
    <div class="sheet-body" id="detailBody"></div>
  </div>
</div>

<script>
// ── DATA ──
let items = JSON.parse(localStorage.getItem('homeItems') || '[]');
let editId = null;
let currentFilter = 'all';

// ── CATEGORY AUTO-DETECT ──
const CAT_RULES = [
  { keywords: ['衛生紙','面紙','抽取式','濕紙巾','廁紙','舒潔','五月花','倍潔雅'], cat: '衛生紙類' },
  { keywords: ['洗碗','洗衣','漂白','除霉','清潔劑','拖把','掃把','地板','馬桶','浴廁','百靈','魔術靈','花王'], cat: '清潔用品' },
  { keywords: ['洗髮','潤髮','沐浴','肥皂','香皂','沐浴乳','洗髮乳','多芬','海倫仙度絲','飛柔','潘婷'], cat: '洗髮沐浴' },
  { keywords: ['牙膏','牙刷','漱口水','牙線','口腔','黑人','舒酸定','高露潔'], cat: '口腔護理' },
  { keywords: ['精華液','精華','化妝水','乳液','面霜','防曬','卸妝','化妝','眼霜','美白','保濕','凝霜','凝露','精油','面膜','敷臉','妝前','底妝','粉底','口紅','唇膏','睫毛膏','眼影','腮紅','保養'], cat: '保養品類' },
  { keywords: ['米','麵','油','鹽','醬油','味噌','醋','糖','醬','辣椒','胡椒'], cat: '調味料' },
  { keywords: ['泡麵','餅乾','零食','糖果','巧克力','飲料','果汁','咖啡','茶','可樂','礦泉水','牛奶','豆漿'], cat: '食品飲料' },
  { keywords: ['保鮮袋','保鮮膜','鋁箔','垃圾袋','廚房紙巾','烘焙紙','夾鏈袋'], cat: '廚房用品' },
  { keywords: ['藥','OK繃','碘酒','消毒','棉花','體溫計','口罩','手套','維他命','感冒','止痛','腸胃'], cat: '醫療藥品' },
  { keywords: ['電池','燈泡','電燈','延長線','插座'], cat: '電池電器' },
  { keywords: ['原子筆','筆記本','膠帶','剪刀','釘書','印表'], cat: '文具辦公' },
  { keywords: ['貓砂','狗糧','貓糧','寵物','貓罐','狗罐'], cat: '寵物用品' },
  { keywords: ['尿布','奶粉','嬰兒','幼兒','濕紙巾嬰兒'], cat: '嬰幼兒用品' },
];

function detectCategory(name) {
  for (const rule of CAT_RULES) {
    for (const kw of rule.keywords) {
      if (name.includes(kw)) return rule.cat;
    }
  }
  return null;
}

function autoCategory() {
  const name = document.getElementById('f_name').value;
  const detected = detectCategory(name);
  const catEl = document.getElementById('f_category');
  const el = document.getElementById('catSuggest');
  if (detected) {
    if (catEl.value !== detected) {
      catEl.value = detected;
      // 顯示已自動填入的提示
      document.getElementById('suggestText').textContent = detected;
      el.style.display = 'block';
      el.style.cursor = 'default';
      el.innerHTML = `✅ 已自動辨識類別：<span style="text-decoration:none">${detected}</span>`;
      el.onclick = null;
    }
  } else {
    el.style.display = 'none';
    // 只有在類別是自動填入的才清空，手動選的不動
  }
}

// ── CATEGORY ICON MAP ──
const CAT_ICONS = {
  '衛生紙類':'🧻','清潔用品':'🧹','洗髮沐浴':'🚿','口腔護理':'🦷','保養品類':'🧴',
  '食品飲料':'🥤','調味料':'🧂','廚房用品':'🍳','醫療藥品':'💊',
  '電池電器':'🔋','文具辦公':'✏️','寵物用品':'🐾','嬰幼兒用品':'👶','其他':'📦'
};
function catIcon(cat) { return CAT_ICONS[cat] || '📦'; }

// ── STATUS ──
function getStatus(item) {
  const today = new Date(); today.setHours(0,0,0,0);
  if (item.expiry) {
    const exp = new Date(item.expiry);
    const diff = Math.round((exp - today) / 86400000);
    if (diff <= 7 && diff >= 0) return 'expiring';
    if (diff < 0) return 'expired';
  }
  if (item.qty === 0) return 'out';
  if (item.minQty && item.qty <= item.minQty) return 'low';
  return 'ok';
}

function needsBuy(item) {
  return item.needBuy || getStatus(item) === 'out' || getStatus(item) === 'low';
}

// ── RENDER LIST ──
function renderList() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const list = document.getElementById('itemList');
  const label = document.getElementById('listLabel');

  let filtered = items.filter(i => {
    const matchSearch = !search || i.name.toLowerCase().includes(search) ||
      (i.category||'').toLowerCase().includes(search) ||
      (i.location||'').toLowerCase().includes(search);
    const matchFilter = currentFilter === 'all' ? true :
      currentFilter === 'need' ? needsBuy(i) :
      i.category === currentFilter;
    return matchSearch && matchFilter;
  });

  label.textContent = currentFilter === 'all' ? `所有備品（${filtered.length}）` :
    currentFilter === 'need' ? `需補充備品（${filtered.length}）` :
    `${currentFilter}（${filtered.length}）`;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🗂️</div>
      <p>${items.length === 0 ? '尚無備品，點右下角＋新增' : '找不到符合的備品'}</p>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(item => {
    const st = getStatus(item);
    const nb = needsBuy(item);
    let statusClass = '';
    if (st === 'out' || st === 'expired') statusClass = 'status-out';
    else if (st === 'low' || st === 'expiring') statusClass = 'status-low';

    let expText = '';
    if (item.expiry) {
      const today = new Date(); today.setHours(0,0,0,0);
      const exp = new Date(item.expiry);
      const diff = Math.round((exp - today) / 86400000);
      if (diff < 0) expText = `<span class="meta-tag" style="background:var(--red-pale);color:var(--red)">已過期</span>`;
      else if (diff <= 7) expText = `<span class="meta-tag" style="background:var(--amber-pale);color:var(--amber)">${diff}天後到期</span>`;
      else expText = `<span class="meta-tag">📅 ${item.expiry}</span>`;
    }

    return `<div class="item-card ${statusClass}" onclick="openDetail('${item.id}')">
      <div class="item-icon">${catIcon(item.category)}</div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-meta">
          ${item.category ? `<span class="meta-tag">${item.category}</span>` : ''}
          ${item.location ? `<span class="meta-tag">📍 ${item.location}</span>` : ''}
          ${expText}
        </div>
      </div>
      <div class="item-right">
        <div class="qty-badge">${item.qty}</div>
        <div class="qty-unit">${item.unit||'個'}</div>
        ${nb ? '<div class="need-buy-tag">需補充</div>' : ''}
      </div>
    </div>`;
  }).join('');
}

// ── UPDATE STATS BAR ──
function updateStats() {
  const total = items.length;
  const need = items.filter(needsBuy).length;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('needBuyCount').textContent = need;

  // Alerts
  const today = new Date(); today.setHours(0,0,0,0);
  const alerts = [], warnings = [];
  items.forEach(i => {
    const st = getStatus(i);
    if (st === 'expired') alerts.push(`${i.name} — 已過期！`);
    else if (st === 'out') alerts.push(`${i.name} — 庫存為零`);
    else if (st === 'expiring') {
      const diff = Math.round((new Date(i.expiry) - today) / 86400000);
      warnings.push(`${i.name} — 還有 ${diff} 天到期`);
    }
    else if (st === 'low') warnings.push(`${i.name} — 數量偏低（剩 ${i.qty} ${i.unit||'個'}）`);
    if (i.needBuy) warnings.push(`${i.name} — 已標記需購買`);
  });

  const aB = document.getElementById('alertBanner');
  const wB = document.getElementById('warningBanner');
  if (alerts.length) {
    aB.style.display = 'block';
    document.getElementById('alertList').innerHTML = alerts.map(a=>`<div class="alert-item">${a}</div>`).join('');
  } else { aB.style.display = 'none'; }
  if (warnings.length) {
    wB.style.display = 'block';
    document.getElementById('warningList').innerHTML = warnings.map(w=>`<div class="warning-item">${w}</div>`).join('');
  } else { wB.style.display = 'none'; }

  updateFilterChips();
  renderStats();
  renderNotif(alerts, warnings);
}

// ── FILTER CHIPS ──
function updateFilterChips() {
  const row = document.getElementById('filterRow');
  const cats = [...new Set(items.map(i => i.category).filter(Boolean))];
  const existing = [...row.querySelectorAll('[data-filter]')].map(b=>b.dataset.filter);
  cats.forEach(c => {
    if (!existing.includes(c)) {
      const btn = document.createElement('button');
      btn.className = 'filter-chip';
      btn.dataset.filter = c;
      btn.textContent = catIcon(c) + ' ' + c;
      btn.onclick = () => setFilter(c, btn);
      row.appendChild(btn);
    }
  });
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

// ── ADD/EDIT MODAL ──
function openAddModal() {
  editId = null;
  document.getElementById('modalTitle').textContent = '新增備品';
  document.getElementById('deleteBtn').style.display = 'none';
  ['f_name','f_location','f_unit'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f_category').value = '';
  document.getElementById('f_qty').value = '';
  document.getElementById('f_minQty').value = '';
  document.getElementById('f_expiry').value = '';
  document.getElementById('f_needBuy').classList.remove('on');
  document.getElementById('catSuggest').style.display = 'none';
  openModal('addModal');
}

function openEditModal(id) {
  const item = items.find(i=>i.id===id);
  if (!item) return;
  editId = id;
  document.getElementById('modalTitle').textContent = '編輯備品';
  document.getElementById('deleteBtn').style.display = 'block';
  document.getElementById('f_name').value = item.name;
  document.getElementById('f_category').value = item.category||'';
  document.getElementById('f_location').value = item.location||'';
  document.getElementById('f_qty').value = item.qty;
  document.getElementById('f_unit').value = item.unit||'';
  document.getElementById('f_minQty').value = item.minQty||'';
  document.getElementById('f_expiry').value = item.expiry||'';
  if (item.needBuy) document.getElementById('f_needBuy').classList.add('on');
  else document.getElementById('f_needBuy').classList.remove('on');
  document.getElementById('catSuggest').style.display = 'none';
  closeModal('detailModal');
  openModal('addModal');
}

function saveItem() {
  const name = document.getElementById('f_name').value.trim();
  if (!name) { alert('請輸入品項名稱'); return; }
  const item = {
    id: editId || Date.now().toString(),
    name,
    category: document.getElementById('f_category').value,
    location: document.getElementById('f_location').value.trim(),
    qty: parseInt(document.getElementById('f_qty').value)||0,
    unit: document.getElementById('f_unit').value.trim(),
    minQty: parseInt(document.getElementById('f_minQty').value)||0,
    expiry: document.getElementById('f_expiry').value,
    needBuy: document.getElementById('f_needBuy').classList.contains('on'),
    updatedAt: new Date().toISOString()
  };
  if (editId) {
    const idx = items.findIndex(i=>i.id===editId);
    items[idx] = item;
  } else {
    items.push(item);
  }
  save(); closeModal('addModal'); render();
}

function deleteItem() {
  if (!confirm('確定要刪除這個備品嗎？')) return;
  items = items.filter(i=>i.id!==editId);
  save(); closeModal('addModal'); render();
}

// ── DETAIL MODAL ──
function openDetail(id) {
  const item = items.find(i=>i.id===id);
  if (!item) return;
  const st = getStatus(item);
  const today = new Date(); today.setHours(0,0,0,0);
  let expiryText = item.expiry || '未設定';
  let expiryStyle = '';
  if (item.expiry) {
    const diff = Math.round((new Date(item.expiry) - today) / 86400000);
    if (diff < 0) { expiryText += ' ⚠️ 已過期'; expiryStyle = 'color:var(--red)'; }
    else if (diff <= 7) { expiryText += ` (還有${diff}天)`; expiryStyle = 'color:var(--amber)'; }
  }

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-icon-wrap">
      <span class="detail-icon-big">${catIcon(item.category)}</span>
      <div class="detail-name">${item.name}</div>
    </div>
    <div class="qty-control">
      <button class="qty-btn" onclick="adjustQty('${id}',-1)">－</button>
      <div class="qty-display" id="detailQty">${item.qty}</div>
      <button class="qty-btn" onclick="adjustQty('${id}',1)">＋</button>
    </div>
    <div style="text-align:center;font-size:13px;color:var(--ink-muted);margin-top:-8px">${item.unit||'個'}</div>
    <div class="detail-grid" style="margin-top:12px">
      <div class="detail-cell">
        <div class="detail-cell-label">類別</div>
        <div class="detail-cell-value">${item.category||'—'}</div>
      </div>
      <div class="detail-cell">
        <div class="detail-cell-label">位置</div>
        <div class="detail-cell-value">${item.location||'—'}</div>
      </div>
      <div class="detail-cell">
        <div class="detail-cell-label">安全庫存</div>
        <div class="detail-cell-value">${item.minQty||0} ${item.unit||'個'}</div>
      </div>
      <div class="detail-cell">
        <div class="detail-cell-label">保存期限</div>
        <div class="detail-cell-value" style="${expiryStyle}">${expiryText}</div>
      </div>
    </div>
    <button class="btn-primary" onclick="openEditModal('${id}')" style="margin-top:4px">✏️ 編輯備品</button>
  `;
  openModal('detailModal');
}

function adjustQty(id, delta) {
  const item = items.find(i=>i.id===id);
  if (!item) return;
  item.qty = Math.max(0, item.qty + delta);
  document.getElementById('detailQty').textContent = item.qty;
  save(); render();
}

// ── STATS ──
function renderStats() {
  const catMap = {};
  items.forEach(i => {
    const c = i.category || '其他';
    catMap[c] = (catMap[c]||0)+1;
  });
  const maxVal = Math.max(...Object.values(catMap), 1);
  document.getElementById('catStats').innerHTML = Object.entries(catMap)
    .sort((a,b)=>b[1]-a[1])
    .map(([c,n])=>`
    <div class="category-row">
      <div class="cat-icon">${catIcon(c)}</div>
      <div class="cat-name">${c}</div>
      <div class="cat-bar-wrap"><div class="cat-bar" style="width:${Math.round(n/maxVal*100)}%"></div></div>
      <div class="cat-count">${n}</div>
    </div>`).join('') || '<div style="color:var(--ink-muted);font-size:13px">尚無資料</div>';

  const expired = items.filter(i=>getStatus(i)==='expired').length;
  const expiring = items.filter(i=>getStatus(i)==='expiring').length;
  const need = items.filter(needsBuy).length;
  document.getElementById('overallStats').innerHTML = `
    <div style="display:flex;justify-content:space-between;padding:10px 14px;background:var(--sand);border-radius:10px">
      <span style="font-size:13px;color:var(--ink-soft)">總備品數</span>
      <span style="font-weight:700;color:var(--green-mid)">${items.length} 項</span>
    </div>
    <div style="display:flex;justify-content:space-between;padding:10px 14px;background:var(--red-pale);border-radius:10px">
      <span style="font-size:13px;color:var(--red)">🔴 已過期</span>
      <span style="font-weight:700;color:var(--red)">${expired} 項</span>
    </div>
    <div style="display:flex;justify-content:space-between;padding:10px 14px;background:var(--amber-pale);border-radius:10px">
      <span style="font-size:13px;color:var(--amber)">🟡 即將到期</span>
      <span style="font-weight:700;color:var(--amber)">${expiring} 項</span>
    </div>
    <div style="display:flex;justify-content:space-between;padding:10px 14px;background:var(--green-ghost);border-radius:10px">
      <span style="font-size:13px;color:var(--green-mid)">📋 需補充</span>
      <span style="font-weight:700;color:var(--green-mid)">${need} 項</span>
    </div>
  `;
}

// ── NOTIFICATIONS ──
function renderNotif(alerts, warnings) {
  const list = document.getElementById('notifList');
  if (!alerts.length && !warnings.length) {
    list.innerHTML = `<div class="empty-state" style="padding:40px 0">
      <div class="empty-icon">✅</div><p>目前沒有任何提醒，備品狀況良好！</p>
    </div>`;
    return;
  }
  let html = '';
  if (alerts.length) {
    html += `<div class="notif-section-title">🔴 需立即處理</div>`;
    html += alerts.map(a=>`<div class="notif-card">
      <div class="notif-dot red"></div>
      <div><div class="notif-text">${a}</div><div class="notif-time">今日偵測</div></div>
    </div>`).join('');
  }
  if (warnings.length) {
    html += `<div class="notif-section-title">🟡 注意提醒</div>`;
    html += warnings.map(w=>`<div class="notif-card">
      <div class="notif-dot amber"></div>
      <div><div class="notif-text">${w}</div><div class="notif-time">今日偵測</div></div>
    </div>`).join('');
  }
  list.innerHTML = html;
}

// ── NAV TABS ──
function switchTab(tab) {
  document.getElementById('mainPage').classList.toggle('hidden', tab!=='home');
  document.getElementById('statsPage').classList.toggle('active', tab==='stats');
  document.getElementById('notifPage').classList.toggle('active', tab==='notif');
  document.getElementById('statsPage').style.display = tab==='stats' ? 'block' : 'none';
  document.getElementById('notifPage').style.display = tab==='notif' ? 'block' : 'none';
  document.getElementById('fabBtn').style.display = tab==='home' ? 'flex' : 'none';
  ['navHome','navStats','navNotif'].forEach((id,i)=>{
    document.getElementById(id).classList.toggle('active', ['home','stats','notif'][i]===tab);
  });
}

// ── MODAL HELPERS ──
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeModalOutside(e, id) { if(e.target===document.getElementById(id)) closeModal(id); }

// ── PERSIST ──
function save() { localStorage.setItem('homeItems', JSON.stringify(items)); }
function render() { renderList(); updateStats(); }

// ── INIT ──
render();

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(()=>console.log('SW registered'));
}
</script>
</body>
</html>
